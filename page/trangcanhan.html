<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/trangcanhan.css" />
    <title>Trang cá nhân</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/kiemtradangnhap.js"></script>
  </head>
  <body>
    <div class="anhbia">
      <img
        id="bia"
        src="https://res.cloudinary.com/dfnssx2gm/image/upload/v1777105136/download_3_m149fh.jpg"
        alt=""
      />
    </div>
    <div class="box">
      <div class="khungtenavt">
        <div class="khungavt">
          <img
            onclick="openmenu('ovdoiavt')"
            id="avt"
            src="https://res.cloudinary.com/dfnssx2gm/image/upload/v1777108642/download_2_yvfgfo.jpg"
            alt=""
            class="avt"
          />
          <div class="thayavt"></div>
        </div>
        <div class="khungten">
          <p id="name" class="name">--</p>
        </div>
        <svg
          onclick="dangxuat()"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"
          />
        </svg>
      </div>
      <div class="boxlbtien">
        <div style="display: block">
          <div class="label">Tháng này:</div>
          <div class="boxtien">
            <div class="boxsodu">
              <p>Số dư</p>
              <p id="sodu">100,000</p>
            </div>
            <div class="boxthuchi">
              <div class="boxthu">
                <p class="labelthu">Thu nhập</p>
                <p id="thu">---</p>
              </div>
              <div class="boxchi">
                <p class="labelchi">Chi tiêu</p>
                <p id="chi">---</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <table class="thongtin">
        <tr>
          <th>Email:</th>
          <th id="email">---</th>
        </tr>
        <tr>
          <th>Ngày sinh:</th>
          <th id="namsinh"></th>
        </tr>
        <tr>
          <th>Ngày tham gia</th>
          <th id="ngaythamgia">---</th>
        </tr>
      </table>
      <div onclick="back()" class="back"><p>← Trang chủ</p></div>
    </div>
    <div onclick="closemenu('ovdoiavt')" id="ovdoiavt" class="overlay">
      <div class="menuavt" onclick="event.stopPropagation()">
        <div class="icon"></div>
        <div id="doiavt" class="doiavt">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
          <span>Đổi ảnh đại diện</span>
        </div>
        <div onclick="showavt()" class="xemavt">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7.5 3.75H6A2.25 2.25 0 0 0 3.75 6v1.5M16.5 3.75H18A2.25 2.25 0 0 1 20.25 6v1.5m0 9V18A2.25 2.25 0 0 1 18 20.25h-1.5m-9 0H6A2.25 2.25 0 0 1 3.75 18v-1.5M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
          <span>Xem ảnh đại diện</span>
        </div>
      </div>
    </div>
    <div id="thayimgtam" class="overlayimg" onclick="closemenu('thayimgtam')">
      <img id="imgtam" class="img" src="" alt="" />
      <button id="luu" onclick="event.stopPropagation()">Lưu</button>
    </div>
    <input id="inpavt" type="file" accept="img/*" hidden />
    <div id="showavt" class="overlayimg" onclick="closemenu('thayimgtam')">
      <img id="showimgavt" class="img" src="" alt="" />
      <button id="luu" onclick="event.stopPropagation()">Lưu</button>
    </div>
  </body>
  <script src="../js/trangcanhanfe.js"></script>
  <script src="../js/trangcanhanbe.js"></script>
</html>
